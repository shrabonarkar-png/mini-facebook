<!DOCTYPE html>
<html>
<head>
  <title>Mini Facebook</title>
  <style>
    body {
      font-family: Arial;
      background: #f0f2f5;
      margin: 0;
    }
    .header {
      background: #1877f2;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }
    .container {
      padding: 20px;
    }
    .post-box {
      background: white;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
    }
    textarea {
      width: 100%;
      height: 60px;
    }
    button {
      margin-top: 5px;
      padding: 8px;
      background: #1877f2;
      color: white;
      border: none;
      border-radius: 3px;
    }
    .post {
      background: white;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="header">Mini Facebook</div>

<div class="container">

  <div class="post-box">
    <textarea id="postText" placeholder="What's on your mind?"></textarea>
    <button onclick="addPost()">Post</button>
  </div>

  <div id="posts"></div>

</div>

<script>
function addPost() {
  var text = document.getElementById("postText").value;
  if(text === "") return;

  var postDiv = document.createElement("div");
  postDiv.className = "post";

  postDiv.innerHTML = `
    <p>${text}</p>
    <button onclick="likePost(this)">Like</button>
    <span> 0 Likes</span>
  `;

  document.getElementById("posts").prepend(postDiv);
  document.getElementById("postText").value = "";
}

function likePost(btn) {
  var span = btn.nextElementSibling;
  var count = parseInt(span.innerText);
  count++;
  span.innerText = count + " Likes";
}
</script>

</body>
</html>
