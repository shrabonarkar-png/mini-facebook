<!DOCTYPE html>
<html>
<head>
  <title>Mini Facebook</title>
  <style>
    body {
      font-family: Arial;
      background: #f0f2f5;
      margin: 0;
      padding: 0;
    }
    .header {
      background: #1877f2;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }
    .container {
      max-width: 500px;
      margin: auto;
      padding: 10px;
    }
    .post-box {
      background: white;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    input, button {
      padding: 8px;
      margin-top: 5px;
      width: 100%;
    }
    .post {
      background: white;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
    }
    .btn {
      margin-top: 5px;
      background: #1877f2;
      color: white;
      border: none;
      padding: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="header">Mini Facebook</div>

<div class="container">

  <div class="post-box">
    <input id="postInput" placeholder="What's on your mind?">
    <button onclick="addPost()">Post</button>
  </div>

  <div id="posts"></div>

</div>

<script>
function addPost() {
  let text = document.getElementById("postInput").value;
  if(text === "") return;

  let post = document.createElement("div");
  post.className = "post";

  post.innerHTML = `
    <p>${text}</p>
    <button class="btn" onclick="likePost(this)">Like (0)</button>
    <input placeholder="Comment..." onkeypress="addComment(event, this)">
    <div></div>
  `;

  document.getElementById("posts").prepend(post);
  document.getElementById("postInput").value = "";
}

function likePost(btn) {
  let count = parseInt(btn.innerText.match(/\d+/)[0]);
  count++;
  btn.innerText = "Like (" + count + ")";
}

function addComment(e, input) {
  if(e.key === "Enter") {
    let comment = document.createElement("p");
    comment.innerText = input.value;
    input.nextElementSibling.appendChild(comment);
    input.value = "";
  }
}
</script>

</body>
</html>
